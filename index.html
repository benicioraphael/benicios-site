<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Benício's Doceria</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Escolha sua unidade</h1>

<div class="lojas">
  <button onclick="selecionarLoja('centro')">Centro</button>
  <button onclick="selecionarLoja('ilha')">Ilha do Governador</button>

  window.location.href = "loja.html";
}
</script>

</body>
